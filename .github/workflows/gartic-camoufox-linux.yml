name: Gartic (Camoufox, headless, Linux experiment)
on:
  workflow_dispatch:

jobs:
  gartic-bot:
    # Linux runner pool is wholly separate from the Windows pools, so when
    # windows-latest / windows-2022 say "all runners busy" this label often
    # picks up immediately. Bonus: Linux Camoufox runs slightly hotter than
    # Windows (no Defender, no Update Orchestrator, no DWM compositing) and
    # ubuntu-* minutes are billed at 1x vs Windows' 2x.
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: 1. Aggressive system tuning (services, CPU, network, FS)
        run: |
          set +e
          echo "=== Linux system tuning for Camoufox throughput ==="

          # ---- Stop services that wake to consume CPU ----
          # snapd is the loudest on Ubuntu runners (polls store + indexes
          # mounts). unattended-upgrades wakes apt every few minutes.
          for svc in snapd snapd.socket unattended-upgrades udisks2 \
                     packagekit ModemManager rsyslog avahi-daemon \
                     cron multipathd; do
              sudo systemctl stop    "$svc" 2>/dev/null
              sudo systemctl disable "$svc" 2>/dev/null
          done

          # ---- Disable systemd timers (idle wakers) ----
          for tmr in apt-daily.timer apt-daily-upgrade.timer \
                     logrotate.timer fstrim.timer fwupd-refresh.timer \
                     man-db.timer motd-news.timer ua-timer.timer \
                     update-notifier-download.timer update-notifier-motd.timer \
                     dpkg-db-backup.timer e2scrub_all.timer; do
              sudo systemctl stop    "$tmr" 2>/dev/null
              sudo systemctl disable "$tmr" 2>/dev/null
          done

          # ---- CPU governor: performance (no frequency scaling) ----
          for f in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
              [ -w "$f" ] && echo performance | sudo tee "$f" >/dev/null
          done

          # ---- Disable CPU idle states for deterministic wake latency ----
          for d in /sys/devices/system/cpu/cpu*/cpuidle/state*/disable; do
              [ -w "$d" ] && echo 1 | sudo tee "$d" >/dev/null
          done

          # ---- TCP: BBR congestion control + larger socket buffers ----
          # BBR is the Linux equivalent of Windows' multimedia-throttle removal:
          # saturates Cloudflare's edge in fewer RTTs.
          sudo modprobe tcp_bbr 2>/dev/null
          sudo sysctl -w net.core.default_qdisc=fq                2>/dev/null
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr      2>/dev/null
          sudo sysctl -w net.core.rmem_max=67108864               2>/dev/null
          sudo sysctl -w net.core.wmem_max=67108864               2>/dev/null
          sudo sysctl -w net.ipv4.tcp_rmem='4096 87380 67108864'  2>/dev/null
          sudo sysctl -w net.ipv4.tcp_wmem='4096 65536 67108864'  2>/dev/null
          sudo sysctl -w net.ipv4.tcp_fastopen=3                  2>/dev/null

          # ---- IPv6 off (gartic + Cloudflare reachable over v4; skips AAAA
          #      lookups and Happy-Eyeballs racing).
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1     2>/dev/null
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1 2>/dev/null

          # ---- Filesystem: noatime on root + always-on transparent hugepages ----
          sudo mount -o remount,noatime / 2>/dev/null
          [ -w /sys/kernel/mm/transparent_hugepage/enabled ] && \
              echo always | sudo tee /sys/kernel/mm/transparent_hugepage/enabled >/dev/null

          # ---- Kernel: kill the soft-lockup watchdog (small but real CPU% sink) ----
          sudo sysctl -w kernel.watchdog=0 2>/dev/null

          # ---- Drop the GitHub Actions runner agent priority so Camoufox dominates ----
          pgrep -f 'Runner\.Listener|Runner\.Worker' \
              | xargs -r -I{} sudo renice -n 19 -p {} 2>/dev/null

          echo "=== System tuning complete ==="

      - name: 2. Drop Camoufox project files at /opt/camoufox
        run: |
          sudo mkdir -p /opt/camoufox
          sudo chown "$USER":"$USER" /opt/camoufox

          # generator.py is embedded as base64 to keep this YAML self-contained,
          # byte-for-byte identical to the Windows variants. (Single-quoted so
          # bash performs no expansion on the b64 alphabet.)
          GEN_B64=''
          echo "$GEN_B64" | base64 -d > /opt/camoufox/generator.py
          wc -c /opt/camoufox/generator.py
          head -1 /opt/camoufox/generator.py

      - name: 3. Install Python deps + fetch Camoufox Firefox (Linux build)
        working-directory: /opt/camoufox
        run: |
          # Camoufox/Firefox runtime libs. Most ship preinstalled on
          # ubuntu-24.04 but apt-get is a no-op for already-present packages.
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              libgtk-3-0 libxt6 libdbus-glib-1-2 libpci3 \
              libxss1 libnss3 libasound2t64 \
              fonts-liberation

          python3 -m venv venv
          ./venv/bin/python -m pip install --upgrade pip
          # Pin camoufox AND playwright to the matched, known-good combo.
          # camoufox==0.4.11 fetches its OWN patched Firefox 135.0.1-beta.24
          # (below) and drives it over Playwright's "Juggler" protocol. Playwright
          # bundles an exact Firefox build per release and its Juggler tracks that
          # build, so the playwright client MUST match camoufox's Firefox 135 or
          # the launch handshake mismatches. Firefox 135 ships in Playwright 1.51
          # (1.50→FF134, 1.51→FF135, 1.52→FF137), and camoufox v135.0.1-beta.24
          # explicitly "Add support for Playwright 1.51.0".
          # History of this line: unpinned pulled the newest playwright; 1.60.0
          # CRASHES on the first page error (TypeError reading 'url',
          # FFPage._onUncaughtError — playwright PR #39767 / camoufox #617), while
          # 1.59 (FF143 Juggler, ~8 majors ahead of FF135) HANGS at launch
          # instead. 1.51.x is the only correct pin.
          ./venv/bin/python -m pip install "camoufox==0.4.11" aiohttp "playwright>=1.51.0,<1.52.0"
          # ~150 MB patched Firefox; runner bandwidth makes this fast.
          ./venv/bin/python -m camoufox fetch

      - name: 4. Run generator (this step is the keep-alive)
        working-directory: /opt/camoufox
        env:
          AUTH_SECRET: '74b163d6448f638bc82a6c5b9a6e64f1abd06e2bca6c47c148a041a5dc40f434'   # 32-hex secret from turnstile-system\token-relay\.dev.vars
        run: |
          # Bump our shell to nice=-20 + realtime IO so Python inherits both.
          # Nice can't go negative without CAP_SYS_NICE; renice via sudo grants
          # it. After sudo exits, our shell keeps the new niceness, and the
          # python child inherits.
          sudo renice -n -20 -p $$ >/dev/null
          sudo ionice -c 1 -n 0 -p $$ >/dev/null 2>&1 || true

          # Stdout/err inherit so token logs stream live to the workflow.
          # -u + PYTHONUNBUFFERED: Python block-buffers stdout when it's a pipe
          # (the Actions log is not a TTY), so every print() — browser-launch
          # lines, token lines, and the run_browser crash handler's
          # "[browser N] error: ..." — would otherwise sit in an unflushed
          # buffer and vanish if the process is killed, making a crash-loop look
          # like a silent hang. Force unbuffered so diagnostics stream live.
          PYTHONUNBUFFERED=1 ./venv/bin/python -u generator.py