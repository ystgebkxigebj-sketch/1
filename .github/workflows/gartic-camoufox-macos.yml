name: Gartic Camoufox macOS test
on:
  workflow_dispatch:
    inputs:
      runner:
        description: "macOS runner label"
        required: false
        default: "macos-latest"

jobs:
  gartic-bot:
    runs-on: ${{ github.event.inputs.runner || 'macos-latest' }}
    timeout-minutes: 25
    steps:
      - name: 1. Drop generator + install deps + fetch Camoufox
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/camoufox"
          cd "$RUNNER_TEMP/camoufox"
          printf '%s' '' | python3 -c "import base64,sys;open('generator.py','wb').write(base64.b64decode(sys.stdin.read()))"
          wc -c generator.py
          python3 -m venv venv
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/python -m pip install "camoufox==0.4.11" aiohttp "playwright>=1.51.0,<1.52.0"
          ./venv/bin/python -m camoufox fetch
      - name: 2. Run generator (keep-alive)
        env:
          AUTH_SECRET: '74b163d6448f638bc82a6c5b9a6e64f1abd06e2bca6c47c148a041a5dc40f434'
        run: |
          cd "$RUNNER_TEMP/camoufox"
          PYTHONUNBUFFERED=1 ./venv/bin/python -u generator.py