name: Gartic (Camoufox, headless)
on:
  workflow_dispatch:

jobs:
  gartic-bot:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: 1. Aggressive system tuning (power, Defender, services, FS, network)
        run: |
          Write-Host "=== System tuning for max throughput on a 4-vCPU runner ==="

          # ---- Memory ----
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management' -Name "PagingFiles" -Value "C:\pagefile.sys 20000 20000"
          Disable-MMAgent -mc -ErrorAction SilentlyContinue
          powercfg -h off 2>$null
          Write-Host "Memory: 20GB pagefile, no compression, no hibernation"

          # ---- Power plan: keep CPU at max clock, no core parking ----
          $ultimateGuid = "e9a42b02-d5df-448d-aa00-03f14749eb61"
          powercfg -duplicatescheme $ultimateGuid 2>$null | Out-Null
          powercfg /setactive $ultimateGuid 2>$null
          if ($LASTEXITCODE -ne 0) {
              powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c 2>$null
          }
          powercfg /change standby-timeout-ac 0 2>$null
          powercfg /change monitor-timeout-ac 0 2>$null
          powercfg -setacvalueindex SCHEME_CURRENT SUB_PROCESSOR CPMINCORES 100 2>$null
          powercfg -setacvalueindex SCHEME_CURRENT SUB_PROCESSOR CPMAXCORES 100 2>$null
          powercfg -setacvalueindex SCHEME_CURRENT SUB_PROCESSOR PROCTHROTTLEMIN 100 2>$null
          powercfg /setactive SCHEME_CURRENT 2>$null
          Write-Host "Power: Ultimate plan, no parking, no throttle"

          # ---- Defender: full real-time off + belt-and-suspenders exclusions ----
          Set-MpPreference -DisableRealtimeMonitoring $true   -ErrorAction SilentlyContinue
          Set-MpPreference -DisableBehaviorMonitoring $true   -ErrorAction SilentlyContinue
          Set-MpPreference -DisableIOAVProtection $true       -ErrorAction SilentlyContinue
          Set-MpPreference -DisableScriptScanning $true       -ErrorAction SilentlyContinue
          Set-MpPreference -DisableArchiveScanning $true      -ErrorAction SilentlyContinue
          Set-MpPreference -DisableIntrusionPreventionSystem $true -ErrorAction SilentlyContinue
          Set-MpPreference -MAPSReporting Disabled            -ErrorAction SilentlyContinue
          Set-MpPreference -SubmitSamplesConsent NeverSend    -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath  "C:\camoufox"                                           -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath  "C:\Users\runneradmin\AppData\Local\camoufox"           -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionProcess "python.exe","firefox.exe","camoufox.exe"            -ErrorAction SilentlyContinue
          Write-Host "Defender: real-time off, exclusions kept"

          # ---- Stop background services that wake to consume CPU ----
          $services = @(
              "SysMain", "WSearch", "DiagTrack", "wuauserv", "WerSvc", "Spooler",
              "AudioSrv", "BITS", "lfsvc", "MapsBroker", "RetailDemo",
              "DPS", "WdiServiceHost", "WdiSystemHost"
          )
          foreach ($s in $services) {
              Stop-Service -Name $s -Force -ErrorAction SilentlyContinue
              Set-Service  -Name $s -StartupType Disabled -ErrorAction SilentlyContinue
          }
          Write-Host "Background services: stopped + disabled"

          # ---- Disable scheduled tasks that wake on idle ----
          $tasks = @(
              "\Microsoft\Windows\Defender\Windows Defender Scheduled Scan",
              "\Microsoft\Windows\Defender\Windows Defender Cleanup",
              "\Microsoft\Windows\Defender\Windows Defender Verification",
              "\Microsoft\Windows\Defender\Windows Defender Cache Maintenance",
              "\Microsoft\Windows\Maintenance\WinSAT",
              "\Microsoft\Windows\Application Experience\Microsoft Compatibility Appraiser",
              "\Microsoft\Windows\Application Experience\ProgramDataUpdater",
              "\Microsoft\Windows\Application Experience\StartupAppTask",
              "\Microsoft\Windows\Customer Experience Improvement Program\Consolidator",
              "\Microsoft\Windows\Customer Experience Improvement Program\UsbCeip",
              "\Microsoft\Windows\AppID\SmartScreenSpecific",
              "\Microsoft\Windows\DiskDiagnostic\Microsoft-Windows-DiskDiagnosticDataCollector",
              "\Microsoft\Windows\Autochk\Proxy",
              "\Microsoft\Windows\Windows Error Reporting\QueueReporting",
              "\Microsoft\Windows\UpdateOrchestrator\Schedule Scan",
              "\Microsoft\Windows\WindowsUpdate\Scheduled Start"
          )
          foreach ($t in $tasks) {
              schtasks /Change /TN $t /Disable 2>$null | Out-Null
          }
          Write-Host "Scheduled tasks: idle-wakers disabled"

          # ---- Filesystem ----
          fsutil behavior set disablelastaccess 1 2>$null | Out-Null
          fsutil behavior set disable8dot3 1 2>$null | Out-Null

          # ---- Network: kill Windows' "multimedia" throttle, max responsiveness ----
          $mmKey = 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile'
          Set-ItemProperty -Path $mmKey -Name "NetworkThrottlingIndex" -Value 0xFFFFFFFF -Type DWord -ErrorAction SilentlyContinue
          Set-ItemProperty -Path $mmKey -Name "SystemResponsiveness" -Value 0 -Type DWord -ErrorAction SilentlyContinue

          Write-Host "=== System tuning complete ==="

      - name: 2. Drop Camoufox project files at C:\camoufox
        run: |
          $proj = "C:\camoufox"
          New-Item -ItemType Directory -Force -Path $proj | Out-Null

          # generator.py is embedded as base64 to avoid YAML/PowerShell heredoc
          # escaping issues. This is the EXACT working version (2 browsers x 3 tabs
          # x 5 lanes = 30 widgets, sequential new_page, domcontentloaded goto).
          $generatorB64 = ""
          [System.IO.File]::WriteAllBytes("$proj\generator.py", [Convert]::FromBase64String($generatorB64))

          Write-Host "Project files dropped at $proj"

      - name: 3. Install Python deps + fetch Camoufox Firefox
        working-directory: C:\camoufox
        run: |
          python -m venv venv
          .\venv\Scripts\python.exe -m pip install --upgrade pip
          .\venv\Scripts\python.exe -m pip install camoufox aiohttp
          # ~150 MB patched Firefox binary; runner bandwidth makes this fast.
          .\venv\Scripts\python.exe -m camoufox fetch

      - name: 4. Run generator (this step is the keep-alive)
        working-directory: C:\camoufox
        run: |
          # Start at HIGH priority. Direct invocation would inherit Normal;
          # Start-Process -PassThru lets us bump the class before WaitForExit.
          # Stdout/err are inherited so token logs stream live to the workflow.
          $p = Start-Process -FilePath ".\venv\Scripts\python.exe" `
                             -ArgumentList "generator.py" `
                             -PassThru -NoNewWindow
          $p.PriorityClass = "High"
          $p.WaitForExit()
          exit $p.ExitCode
