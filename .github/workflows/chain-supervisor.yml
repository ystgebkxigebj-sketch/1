name: Chain Supervisor (refill dead camoufox slots)

# Watchdog for the gartic-camoufox-linux.yml chain. Each producer dispatches
# its own successor in step 5; this workflow exists ONLY to recover slots that
# died before that step ran (runner OOM, hard kill, GH API outage, etc.).
#
# Math: 20 chains × 99.9% uptime = ~19.99 average concurrent. Probability of
# dropping below 18 simultaneously is ~10^-6 (≈0.08 sec/day). Effectively never.
#
# Cost: this workflow uses 1 of the 20 slots for ~30s every 5min ≈ 0.1% of
# wall time. Negligible. Targets 20 producers; supervisor occasionally queues
# briefly behind them, which is fine — it's a watchdog, not realtime.

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:        # manual bootstrap trigger

# Only one supervisor at a time — if a tick runs long, the next tick replaces it
# rather than piling up duplicate dispatches.
concurrency:
  group: chain-supervisor
  cancel-in-progress: true

jobs:
  refill:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Count in-flight producers and refill the deficit
        env:
          GH_TOKEN: ${{ secrets.CHAIN_PAT }}
          GH_REPO: ${{ github.repository }}   # tells gh which repo without a checkout
          PRODUCER: gartic-camoufox-linux.yml
          TARGET: 20
        run: |
          set -e

          active=$(gh run list -w "$PRODUCER" -s in_progress --json databaseId -L 100 | jq length)
          queued=$(gh run list -w "$PRODUCER" -s queued      --json databaseId -L 100 | jq length)
          inflight=$((active + queued))
          deficit=$((TARGET - inflight))

          echo "active=$active queued=$queued inflight=$inflight target=$TARGET deficit=$deficit"

          if [ "$deficit" -le 0 ]; then
            echo "No refill needed."
            exit 0
          fi

          echo "Dispatching $deficit producer(s) to refill the chain..."
          for ((i=0; i<deficit; i++)); do
            if gh workflow run "$PRODUCER"; then
              echo "  dispatched $((i+1))/$deficit"
            else
              echo "  dispatch $((i+1))/$deficit FAILED — next supervisor tick will retry"
            fi
            sleep 2
          done
